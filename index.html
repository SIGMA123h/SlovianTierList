<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlovinTierMC List PvP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="blue">
    <div class="ambient-grid" aria-hidden="true"></div>

    <header class="topbar">
      <nav class="nav-shell" aria-label="Główna nawigacja">
        <div class="nav-left">
          <button
            class="icon-button menu-toggle"
            type="button"
            aria-label="Otwórz menu tierlist"
            aria-controls="tierMenu"
            aria-expanded="false"
            title="Menu"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>

          <button class="nav-button active" type="button" data-view="home">
            Strona główna
          </button>
        </div>

        <button class="brand-button" type="button" data-view="home" aria-label="SlovinTierMC">
          <span class="brand-mark" aria-hidden="true">S</span>
          <span>SlovinTierMC</span>
        </button>

        <div class="nav-right">
          <button class="nav-button admin-button" type="button" data-view="admin">Admin</button>
          <button class="nav-button" type="button" data-view="settings">Ustawienia</button>
        </div>
      </nav>

      <div class="tier-menu" id="tierMenu" hidden>
        <div class="tier-menu-inner">
          <button class="tier-menu-link" type="button" data-view="general">
            General Tierlist
          </button>
          <button class="tier-menu-link" type="button" data-view="sword">
            Sword Tierlist
          </button>
          <button class="tier-menu-link" type="button" data-view="axe">
            Axe Tierlist
          </button>
          <button class="tier-menu-link" type="button" data-view="mace">
            Mace Tierlist
          </button>
          <button class="tier-menu-link" type="button" data-view="crystal">
            Crystal Tierlist
          </button>
          <button class="tier-menu-link" type="button" data-view="potion">
            Potion Tierlist
          </button>
          <button class="tier-menu-link" type="button" data-view="about">
            About Tiertesting
          </button>
          <button class="tier-menu-link discord-link" type="button" data-view="discord">
            <svg class="discord-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M19.2 5.1A15.7 15.7 0 0 0 15.4 4l-.2.4c1.3.3 2.5.9 3.5 1.6a11.7 11.7 0 0 0-4.2-1.3 12 12 0 0 0-5 0 11.7 11.7 0 0 0-4.2 1.3c1-.7 2.2-1.3 3.5-1.6L8.6 4a15.7 15.7 0 0 0-3.8 1.1C2.4 8.6 1.7 12 2 15.3A15.2 15.2 0 0 0 6.7 18l.6-.8a9.5 9.5 0 0 1-1.5-.7l.4-.3c2.8 1.3 5.8 1.3 8.6 0l.4.3c-.5.3-1 .5-1.5.7l.6.8a15.2 15.2 0 0 0 4.7-2.7c.4-3.8-.6-7.1-2.8-10.2ZM8.8 13.2c-.8 0-1.4-.7-1.4-1.5s.6-1.5 1.4-1.5 1.5.7 1.5 1.5-.7 1.5-1.5 1.5Zm6.4 0c-.8 0-1.5-.7-1.5-1.5s.7-1.5 1.5-1.5 1.4.7 1.4 1.5-.6 1.5-1.4 1.5Z"
              />
            </svg>
            Discord
          </button>
        </div>
      </div>
    </header>

    <main class="page-shell">
      <section class="stage-panel" aria-live="polite">
        <div class="stage-heading">
          <p class="eyebrow" id="viewKicker">MC List PvP</p>
          <h1 id="viewTitle">SlovinTierMC List</h1>
          <p id="viewSubtitle">
            Najlepsza trójka graczy na podium z automatycznie ładowanymi skinami Minecraft.
          </p>
        </div>

        <div class="view-content" id="viewContent"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
